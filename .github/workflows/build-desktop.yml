name: Build desktop installers

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            script: dist:mac
          - name: Windows
            os: windows-latest
            script: dist:win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python packager
        run: python -m pip install --upgrade pip pyinstaller

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run ${{ matrix.script }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trading-discipline-workbench-${{ matrix.name }}
          path: release/**
